<div class="container-fluid p-4">
  <div class="row g-4">

    <!-- LEFT PANEL -->
    <div class="col-md-3">
      <div class="card">
        <div class="card-header fw-bold">
          Motherboard RGB
        </div>
        <div class="card-body">

          <p><strong>Device:</strong> {{ .Device.Product }}</p>
          <p><strong>Serial:</strong> {{ .Device.Serial }}</p>
          <p><strong>Zones:</strong> 3</p>
          <p><strong>Mode:</strong> Grouped</p>

          <hr>

          <!-- Brightness -->
          <label class="form-label">Brightness</label>
          <input type="range" id="mbBrightness" class="form-range" min="0" max="100" value="100">
          <div id="mbBrightnessValue">100%</div>

          <!-- Effect -->
          <label class="form-label mt-3">Effect</label>
          <select id="mbEffect" class="form-select">
            <option value="static">Static</option>
            <option value="breathing">Breathing</option>
            <option value="colorpulse">Color Pulse</option>
            <option value="colorshift">Color Shift</option>
            <option value="rainbow">Rainbow</option>
          </select>

          <!-- Speed -->
          <label class="form-label mt-3">Speed</label>
          <select id="mbSpeed" class="form-select">
            <option value="slow">Slow</option>
            <option value="normal" selected>Normal</option>
            <option value="fast">Fast</option>
          </select>

          <!-- Color -->
          <label class="form-label mt-3">Color</label>
          <input type="color" id="mbColor" class="form-control form-control-color" value="#63d5ff">

          <!-- Apply -->
          <button id="mbApply" class="btn btn-primary mt-3 w-100">Apply</button>

        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="col-md-9">
      <div class="row g-4">

        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-header">Motherboard Lighting</div>
            <div class="card-body">
              <p>All zones linked</p>
              <p>Single control surface</p>
              <p>Status: Ready</p>
            </div>
          </div>
        </div>

        <!-- Zones -->
        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-header">Zone 1</div>
            <div class="card-body">
              <p>Linked</p>
              <p>Global effect</p>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-header">Zone 2</div>
            <div class="card-body">
              <p>Linked</p>
              <p>Global effect</p>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-header">Zone 3</div>
            <div class="card-body">
              <p>Linked</p>
              <p>Global effect</p>
            </div>
          </div>
        </div>

        <!-- Quick colors -->
        <div class="col-md-8">
          <div class="card text-center">
            <div class="card-header">Quick Colors</div>
            <div class="card-body d-flex gap-2 justify-content-center flex-wrap">
              <button class="btn btn-danger" onclick="setColor(255,0,0)">Red</button>
              <button class="btn btn-success" onclick="setColor(0,255,0)">Green</button>
              <button class="btn btn-primary" onclick="setColor(0,0,255)">Blue</button>
              <button class="btn btn-secondary" onclick="setColor(255,255,255)">White</button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
function setColor(r, g, b) {
  fetch('/api/openrgbimport/color', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ r, g, b })
  });
}

const slider = document.getElementById('mbBrightness');
const sliderValue = document.getElementById('mbBrightnessValue');

slider.addEventListener('input', function () {
  sliderValue.textContent = this.value + "%";
});

document.getElementById('mbApply').addEventListener('click', function () {
  const hex = document.getElementById('mbColor').value.replace('#', '');
  const r = parseInt(hex.substring(0, 2), 16);
  const g = parseInt(hex.substring(2, 4), 16);
  const b = parseInt(hex.substring(4, 6), 16);
  setColor(r, g, b);
});
</script>
